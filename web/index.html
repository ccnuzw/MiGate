<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiGate</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('migate-theme') || 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
